    <body dir="ltr" itemscope itemtype="http://schema.org/WebPage" id="yDmH0d" css="yDmH0d">
        <div class="container-fluid p-5">
            <div class="row">
                <div class="col-12">
                    <a href="/Figuras_Geometricas_2/">
                        <button type="button" class="btn btn-lg" title="Voltar"><i class="bi bi-arrow-left"></i></button>
                    </a>
                </div>
                <div class="col-12 mt-3">
                    <div class="progress" role="progressbar" title="Barra de progresso" aria-label="Barra de progresso" aria-valuenow="calc(100 / 34)" aria-valuemin="0"
                        aria-valuemax="100">
                        <div class="progress-bar" style="width: calc(100% / 34);"></div>
                    </div>
                </div>
                <div class="col-12 m-2">
                    <h1>QUAL O NOME DA FIGURA GEOMÉTRICA DESTACADA NO CONTORNO VERMELHO?</h1>
                </div>
                <div class="col-12 d-md-flex justify-content-center">
                    <div class="card">
                        <div class="card-body text-center">
                            <h5 class="card-title">Gomos Brancos da Bola de Futebol</h5>
                            <img title='Bola de Futebol, com destaque para um gomo branco' src="./imagens/Bola de Futebol - Gomo Branco.png" width="350vw">
                        </div>
                    </div>
                </div>
                <div class="col-12 mt-3 d-flex justify-content-center">
                    <div class="text-center">
                        <div class="mb-3">
                            <button class="btn btn-lg btn-success" type="submit" onclick="figuraCorreta(this.value)" name="figura" id="figura" value="pentágono" title="pentágono" aria-label="pentágono" required>PENTÁGONO</button>
                            <button class="btn btn-lg btn-success" type="submit" onclick="figuraCorreta(this.value)" name="figura" id="figura" value="círculo" title="círculo" aria-label="círculo" required>CÍRCULO</button>
                            <button class="btn btn-lg btn-success" type="submit" onclick="figuraCorreta(this.value)" name="figura" id="figura" value="hexágono" title="hexágono" aria-label="hexágono" required>HEXÁGONO</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const b = document.querySelector('.progress');
                const bar = document.querySelector('.progress-bar');
                if (!bar) return;
                const target = 200 / 34;
                bar.style.transition = 'width 0.25s ease-in-out';
                setTimeout(() => {
                    b.setAttribute('aria-valuenow', String(target));
                    bar.style.width = target + '%';
                }, 50);
            });
        </script>
        <script>
            function figuraCorreta(figura) {
                if(figura != "hexágono") {
                    alert("Resposta incorreta! Por favor, tente novamente.");
                } else {
                    alert("Resposta correta! Parabéns!");
                    window.location.href = "4.html";
                }
            }
        </script>
